name = "desire-sub-worker"
main = "worker.js"
compatibility_date = "2024-03-07"

# 绑定 KV 命名空间 (用于缓存和任务状态)
[[kv_namespaces]]
binding = "TASK_KV"
id = "dfaf2ef43c0b48e0861fac36aa919ff4"

# 绑定 D1 数据库 (用于存储优选 IP)
[[d1_databases]]
binding = "DB"
database_name = "sub-db"
database_id = "fbe1713b-c308-41e7-be4b-1c5d323e108e"

# --- 环境变量建议在 Cloudflare 后台面板设置以保证安全 ---
# [vars]
ADMIN_PASSWORD = "xxulovemi" 
SUB_TOKEN = "xxulovemi"
